<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encuesta Institucional</title>

<meta name="referrer" content="origin">

<style>
body{
  font-family: Arial, sans-serif;
  background:#f3f6f9;
  margin:0;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
}

.card{
  background:white;
  padding:20px;
  margin-bottom:20px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

h1,h2{
  color:#1565c0;
}

label{
  font-weight:bold;
  display:block;
  margin-top:10px;
}

input, select, textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:15px;
  background:#1565c0;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#0d47a1;
}

.icon-title{
  display:flex;
  align-items:center;
  gap:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>📋 Lectura de Contexto Institucional</h1>

<form action="https://formspree.io/f/maqkggyr" method="POST">

<!-- 1 -->
<div class="card">
<h2 class="icon-title">📚 1. Rol en la Comunidad Educativa</h2>

<label>Rol *</label>
<select name="rol" required>
<option value="">Selecciona...</option>
<option>Docente</option>
<option>Directivo</option>
<option>Estudiante</option>
<option>Padre / Madre</option>
</select>
</div>

<!-- 2 -->
<div class="card">
<h2 class="icon-title">👤 2. Perfil Demográfico Personal</h2>

<label>Nombre completo</label>
<input type="text" name="nombre">

<label>Número de contacto</label>
<input type="text" name="telefono">

<label>Edad *</label>
<input type="number" name="edad" required>

<label>Género *</label>
<select name="genero" required>
<option value="">Selecciona...</option>
<option>Masculino</option>
<option>Femenino</option>
<option>Otro</option>
</select>

<label>Estrato socioeconómico</label>
<input type="text" name="estrato">

<label>Barrio o vereda</label>
<input type="text" name="barrio">

<label>Zona</label>
<input type="text" name="zona">

<label>Pertenencia étnica</label>
<input type="text" name="etnia">

<label>Tiempo en institución</label>
<input type="text" name="tiempo">

<label>Origen</label>
<input type="text" name="origen">
</div>

<!-- 3 -->
<div class="card">
<h2 class="icon-title">🏠 3. Condiciones del Hogar</h2>

<label>Personas en el hogar</label>
<input type="text" name="personas_hogar">

<label>Núcleo familiar</label>
<input type="text" name="familia">

<label>Tipo de vivienda</label>
<input type="text" name="vivienda">

<label>Servicios del hogar</label>
<textarea name="servicios"></textarea>

<label>Tecnología en casa</label>
<input type="text" name="tecnologia">

<label>Programas sociales</label>
<input type="text" name="programas">

<label>Régimen de salud</label>
<input type="text" name="salud">
</div>

<!-- 4 -->
<div class="card">
<h2 class="icon-title">🌊 4. Territorio</h2>

<label>Realidades del territorio</label>
<textarea name="realidades"></textarea>

<label>Situación que más pesa</label>
<textarea name="situacion"></textarea>

<label>Tradiciones culturales</label>
<textarea name="tradiciones"></textarea>

<label>Riqueza del territorio</label>
<textarea name="riqueza"></textarea>
</div>

<!-- 5 -->
<div class="card">
<h2 class="icon-title">🌿 5. Saberes locales</h2>

<label>Relación escuela-territorio (1-5)</label>
<input type="number" name="relacion" min="1" max="5">

<label>Saberes educativos</label>
<textarea name="saberes"></textarea>

<label>Conocimiento familiar</label>
<textarea name="conocimiento_familiar"></textarea>

<label>Actores del municipio</label>
<textarea name="actores"></textarea>
</div>

<!-- 6 -->
<div class="card">
<h2 class="icon-title">💬 6. Percepción institucional</h2>

<label>Conocimiento de la realidad (1-5)</label>
<input type="number" name="conocimiento" min="1" max="5">

<label>Satisfacción (1-5)</label>
<input type="number" name="satisfaccion" min="1" max="5">

<label>Seguridad participación (1-5)</label>
<input type="number" name="seguridad" min="1" max="5">

<label>Barrera de participación</label>
<input type="text" name="barrera">

<label>Medio de comunicación</label>
<input type="text" name="medio">

<label>Experiencias</label>
<textarea name="experiencias"></textarea>

<label>Propuesta</label>
<textarea name="propuesta"></textarea>

<label>Comentario final</label>
<textarea name="comentario"></textarea>
</div>

<button type="submit">Enviar Encuesta</button>

</form>

</div>

</body>
</html>
