<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lectura de Contexto Institucional</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f3f6f9;
  margin:0;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
}

.card{
  background:white;
  padding:25px;
  margin-bottom:20px;
  border-radius:15px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

h1{
  text-align:center;
  color:#1565c0;
}

h2{
  color:#1565c0;
}

label{
  font-weight:bold;
  display:block;
  margin-top:15px;
}

input, select, textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:1px solid #ccc;
  border-radius:8px;
  box-sizing:border-box;
}

.roles{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  margin-top:20px;
}

.role{
  border:2px solid #1565c0;
  padding:15px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}

button{
  background:#1565c0;
  color:white;
  border:none;
  padding:15px;
  border-radius:10px;
  font-size:16px;
  width:100%;
  cursor:pointer;
  margin-top:20px;
}

button:hover{
  background:#0d47a1;
}
</style>
</head>

<body>

<form action="https://formspree.io/f/xeedbdpw" method="POST">

<div class="container">

<h1>Lectura de Contexto Institucional</h1>

<div class="card">
<h2>📚 1. Tu Rol en la Comunidad Educativa</h2>

<p>Selecciona cómo participas.</p>

<div class="roles">
  <label><input type="radio" name="rol" value="Docente"> Docente 📚</label>
  <label><input type="radio" name="rol" value="Directivo"> Directivo 🏛️</label>
  <label><input type="radio" name="rol" value="Estudiante"> Estudiante 🎒</label>
  <label><input type="radio" name="rol" value="Padre/Madre"> Padre / Madre 👨‍👩‍👧</label>
</div>

</div>

<div class="card">
<h2>📋 2. Perfil Demográfico Personal</h2>

<label>Nombre completo</label>
<input type="text" name="nombre" required>

<label>Número de contacto</label>
<input type="text" name="telefono" required>

<label>Edad</label>
<input type="number" name="edad" required>

<label>Género</label>
<select name="genero" required>
  <option value="">Selecciona...</option>
  <option value="Masculino">Masculino</option>
  <option value="Femenino">Femenino</option>
  <option value="Otro">Otro</option>
</select>

</div>

<div class="card">
<h2>📝 Comentarios</h2>

<label>Opinión general</label>
<textarea name="opinion" rows="5" required></textarea>

</div>

</div>

<button type="submit">Enviar Encuesta</button>

</form>

</body>
</html>
